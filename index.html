<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="icone_site.jpeg">
<link rel="apple-touch-icon" sizes="180x180" href="icone_site.jpeg">
<title>Compte à rebours live</title>

<style>
body { margin:0; font-family:Arial,sans-serif; background:#111; display:flex; align-items:center; justify-content:center; height:100vh;}
.countdown-container { display:flex; flex-direction:column; align-items:center; background:rgba(17,17,17,0.9); padding:25px; border-radius:16px; width:90%; max-width:400px; text-align:center; box-shadow:0 0 30px rgba(255,255,255,0.1);}
.time-remaining { font-size:3rem; color:#fff; margin-bottom:10px; transition: all 0.3s ease; }
.target-time { font-size:1.2rem; color:#9CA3AF; margin-bottom:10px; }
#modeIndicator { font-weight:bold; margin-bottom:10px; }
#eventName { color:#FFD700; margin-bottom:10px; }
#eventImage { width:150px; margin-bottom:15px; border-radius:12px; transition: transform 0.3s ease; }
#eventImage:hover { transform: scale(1.05); }
.time-picker-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:#1F1F1F; padding:20px; border-radius:12px; display:flex; flex-direction:column; align-items:center; gap:12px; z-index:999; box-shadow:0 0 20px rgba(255,255,255,0.2); opacity:0; transition:transform 0.25s ease, opacity 0.25s ease; }
.time-picker-popup.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
.time-picker-popup input { font-size:1rem; padding:8px; border-radius:8px; border:none; text-align:center; width:150px; }
.time-picker-popup button { padding:10px 16px; border-radius:8px; font-weight:bold; border:none; cursor:pointer; color:#fff; background:#3B82F6; }
.buttons { display:flex; flex-direction:column; gap:10px; width:100%; }
.buttons button { padding:12px; border:none; border-radius:10px; font-size:1rem; font-weight:bold; cursor:pointer; transition:opacity 0.2s ease, transform 0.1s ease; }
.buttons button:hover, .buttons button:active { opacity:0.85; transform:scale(0.97); }
.btn-primary { background:#3B82F6; color:#fff; }
.btn-secondary { background:#22C55E; color:#fff; }
.btn-tertiary { background:#374151; color:#fff; }
.btn-switch { background:#F59E0B; color:#fff; }
@media(max-width:400px){ .time-remaining{ font-size:2.4rem;} .target-time{ font-size:1rem;} .buttons button{ padding:10px; font-size:0.95rem;} .time-picker-popup input{ width:100%; } }
</style>
</head>

<body>
<div class="countdown-container">
  <div id="modeIndicator">Mode : Manuel</div>
  <div class="time-remaining" id="timeRemaining">00:00:00</div>
  <div class="target-time" id="targetTime">CIBLE : --:--</div>
  <div id="eventName">Événement</div>
  <img id="eventImage" src="" alt="Image événement">

  <div class="buttons">
    <button class="btn-primary" onclick="showTimePicker()">CHOISIR HEURE</button>
    <button class="btn-secondary" onclick="startCountdownManual()">START MANUEL</button>
    <button class="btn-tertiary" onclick="resetCountdown()">RESET</button>
    <button class="btn-switch" onclick="switchMode()">SWITCH MODE</button>
    <button class="btn-primary" onclick="loadEventFromAPI()">CHARGER API</button>
  </div>
</div>

<div class="time-picker-popup" id="timePickerPopup">
  <input type="time" id="timeInput">
  <button onclick="confirmTime()">Valider</button>
</div>

<script src="script.js"></script>
</body>
</html>
