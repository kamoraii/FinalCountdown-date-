<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="icone_site.jpeg">
<link rel="apple-touch-icon" sizes="180x180" href="icone_site.jpeg">

<title>Combien de temps y me reste ?</title>

<style>

body {
margin:0;
font-family:Arial, sans-serif;
background-color:#111111;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:50px 50px;
animation:moveLines 10s linear infinite;
z-index:0;
}

@keyframes moveLines{
0%{transform:translate(0,0);}
100%{transform:translate(-50px,-50px);}
}

.countdown-container{
position:relative;
z-index:1;
display:flex;
flex-direction:column;
align-items:center;
background-color:rgba(17,17,17,0.9);
padding:25px;
border-radius:16px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 0 20px rgba(255,255,255,0.05);
}

.time-remaining{
font-size:3rem;
color:#FFFFFF;
margin-bottom:10px;
}

.target-time{
font-size:1.2rem;
color:#9CA3AF;
margin-bottom:10px;
}

.buttons{
display:flex;
flex-direction:column;
gap:12px;
width:100%;
}

.buttons button{
padding:14px;
border:none;
border-radius:10px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
}

.btn-primary{background:#3B82F6;color:white;}
.btn-secondary{background:#22C55E;color:white;}
.btn-tertiary{background:#374151;color:white;}

.time-picker-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#1F1F1F;
padding:20px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:12px;
z-index:999;
opacity:0;
transition:0.25s;
}

.time-picker-popup.show{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

.time-picker-popup input{
font-size:1rem;
padding:8px;
border-radius:8px;
border:none;
text-align:center;
}

.api-info{
margin-top:15px;
color:white;
}

.api-info img{
width:100%;
max-width:300px;
border-radius:12px;
}

</style>
</head>

<body>

<div class="countdown-container">

<div class="time-remaining" id="timeRemaining">00:00:00</div>
<div class="target-time" id="targetTime">CIBLE : --:--</div>

<div class="buttons">

<button class="btn-primary" onclick="showTimePicker()">CHOISIR HEURE</button>

<button class="btn-secondary" onclick="startCountdown()">START</button>

<button class="btn-tertiary" onclick="resetCountdown()">RESET</button>

<button class="btn-primary" onclick="loadAPI()">CHARGER API</button>

<button class="btn-secondary" onclick="switchMode()">SWITCH MANUEL/API</button>

</div>

<div class="api-info">
<div id="apiTitle"></div>
<img id="apiImage" src="">
</div>

</div>

<div class="time-picker-popup" id="timePickerPopup">

<input type="time" id="timeInput">

<button onclick="confirmTime()">Valider</button>

</div>

<script>

let countdownInterval
let targetDate=null
let usingAPI=false

const LS_MANUAL='targetDateManual'
const LS_API='targetDateAPI'

window.addEventListener('load',()=>{

const manual=localStorage.getItem(LS_MANUAL)
const api=localStorage.getItem(LS_API)

if(manual){

targetDate=new Date(manual)
usingAPI=false
updateTargetDisplay()
startCountdown()

}

else if(api){

targetDate=new Date(api)
usingAPI=true
updateTargetDisplay()
startCountdown()

}

})

function updateDisplay(){

const display=document.getElementById("timeRemaining")

if(!targetDate){

display.textContent="00:00:00"
return

}

const now=new Date()
let diff=targetDate-now

if(diff<=0){

display.textContent="00:00:00"
clearInterval(countdownInterval)

return

}

const h=Math.floor(diff/1000/3600)
const m=Math.floor((diff/1000%3600)/60)
const s=Math.floor(diff/1000%60)

display.textContent=
String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0')

}

function startCountdown(){

if(!targetDate){

alert("Choisissez une heure ou une API")

return

}

clearInterval(countdownInterval)

updateDisplay()

countdownInterval=setInterval(updateDisplay,1000)

}

function resetCountdown(){

clearInterval(countdownInterval)

targetDate=null

document.getElementById("timeRemaining").textContent="00:00:00"

document.getElementById("targetTime").textContent="CIBLE : --:--"

document.getElementById("apiTitle").textContent=""

document.getElementById("apiImage").src=""

localStorage.removeItem(LS_MANUAL)
localStorage.removeItem(LS_API)

}

function showTimePicker(){

document.getElementById("timePickerPopup").classList.add('show')

}

function confirmTime(){

const val=document.getElementById("timeInput").value

if(!val)return

const [h,m]=val.split(":")

const now=new Date()

targetDate=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m)

if(targetDate<now)targetDate.setDate(targetDate.getDate()+1)

usingAPI=false

localStorage.setItem(LS_MANUAL,targetDate)

updateTargetDisplay()

startCountdown()

document.getElementById("timePickerPopup").classList.remove('show')

}

function switchMode(){

const manual=localStorage.getItem(LS_MANUAL)

const api=localStorage.getItem(LS_API)

if(usingAPI && manual){

targetDate=new Date(manual)
usingAPI=false

}

else if(!usingAPI && api){

targetDate=new Date(api)
usingAPI=true

}

updateTargetDisplay()

}

function updateTargetDisplay(){

document.getElementById("targetTime").textContent=
"CIBLE : "+targetDate.toTimeString().slice(0,5)

}

/* -------- API ULTRA COMPATIBLE -------- */

async function loadAPI(){

try{

let url=prompt("URL API JSON")

if(!url)return

let res=await fetch(url)

let data=await res.json()

let foundDates=[]

function extractDates(obj){

for(let key in obj){

let val=obj[key]

if(typeof val==="string"){

let d=new Date(val)

if(!isNaN(d))foundDates.push(d)

}

if(typeof key==="string"){

let dk=new Date(key)

if(!isNaN(dk))foundDates.push(dk)

}

if(typeof val==="object")extractDates(val)

}

}

extractDates(data)

if(foundDates.length===0){

alert("Aucune date trouvée dans API")

return

}

let now=new Date()

let future=foundDates.filter(d=>d>now)

if(future.length===0){

alert("Toutes les dates sont passées")

return

}

future.sort((a,b)=>a-b)

targetDate=future[0]

usingAPI=true

localStorage.setItem(LS_API,targetDate)

updateTargetDisplay()

startCountdown()

}
catch(e){

alert("Erreur API")

console.error(e)

}

}

</script>

</body>
</html>
