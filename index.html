<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte à rebours interactif</title>
<link rel="icon" type="image/jpeg" href="icone_site.jpeg">
<link rel="apple-touch-icon" href="icone_site.jpeg">
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
#countdown {
  font-size: 4em;
  margin: 0.5em 0;
}
#target {
  font-size: 1em;
  margin-bottom: 1em;
}
#eventTitle {
  font-size: 1.5em;
  margin: 0.5em 0;
}
#eventImage {
  max-width: 80%;
  max-height: 200px;
  display: block;
  margin-bottom: 1em;
}
button {
  margin: 0.2em;
  padding: 0.5em 1em;
  font-size: 1em;
  cursor: pointer;
  border: none;
  border-radius: 5px;
  background: #333;
  color: #fff;
  transition: 0.2s;
}
button:hover { background: #555; }
button:active { background: #777; }
canvas { position: fixed; top: 0; left: 0; z-index: -1; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="countdown">--:--:--</div>
<div id="target">CIBLE : --</div>
<div id="eventTitle"></div>
<img id="eventImage" src="" alt="" style="display:none;">
<div>
<button id="chooseTime">CHOISIR HEURE</button>
<button id="startBtn">START</button>
<button id="resetBtn">RESET</button>
<button id="switchBtn">SWITCH MANUEL/API</button>
<button id="loadAPI">CHARGER API</button>
</div>

<script>
let manualDate=null;
let apiDate=null;
let usingAPI=false;
let interval=null;
let apiUrl="";
const LS_MANUAL="manualDate";
const LS_API="apiDate";
const LS_APIURL="apiUrl";

const countdown=document.getElementById("countdown");
const targetDisplay=document.getElementById("target");
const eventTitle=document.getElementById("eventTitle");
const eventImage=document.getElementById("eventImage");

function updateTargetDisplay(date){
  if(!date) date=new Date();
  targetDisplay.textContent="CIBLE : "+date.toLocaleString();
}

function startCountdown(){
  if(interval) clearInterval(interval);
  interval=setInterval(()=>{
    let now=new Date();
    let diff=(usingAPI?apiDate:manualDate)-now;
    if(diff<0) diff=0;
    let h=Math.floor(diff/3600000);
    let m=Math.floor((diff%3600000)/60000);
    let s=Math.floor((diff%60000)/1000);
    countdown.textContent=`${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
  },1000);
}

function chooseManualTime(){
  let t=prompt("Entrez l'heure HH:MM","");
  if(!t) return;
  let parts=t.split(":");
  if(parts.length!==2) { alert("Format invalide"); return; }
  let d=new Date();
  d.setHours(parseInt(parts[0]));
  d.setMinutes(parseInt(parts[1]));
  d.setSeconds(0);
  if(d<new Date()) d.setDate(d.getDate()+1);
  manualDate=d;
  localStorage.setItem(LS_MANUAL,manualDate.toString());
  if(!usingAPI) updateTargetDisplay(manualDate);
}

function resetManual(){
  manualDate=null;
  localStorage.removeItem(LS_MANUAL);
  if(!usingAPI) updateTargetDisplay(new Date());
}

async function loadAPI(){
  try{
    let url=prompt("Entrez l'URL du JSON de l'API:","evenements.json");
    if(!url) return;
    let res;
    try{ res=await fetch(url); }
    catch(e){
      // tentative proxy CORS
      res=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url));
      if(!res.ok) throw e;
      let txt=await res.json();
      res={json:async()=>JSON.parse(txt.contents)};
    }
    const data=await res.json();
    if(!data.date_utc && !data.date && !data.datetime) throw "Champ date absent";
    apiDate=new Date(data.date_utc||data.date||data.datetime);
    if(isNaN(apiDate)) throw "Date invalide";
    apiUrl=url;
    usingAPI=true;
    localStorage.setItem(LS_API,apiDate.toString());
    localStorage.setItem(LS_APIURL,apiUrl);
    updateTargetDisplay(apiDate);
    eventTitle.textContent=data.name||"";
    if(data.image){ eventImage.src=data.image; eventImage.style.display="block"; }
    else eventImage.style.display="none";
    startCountdown();
  }catch(e){ alert("Erreur chargement API: "+e); console.error(e);}
}

function switchMode(){
  usingAPI=!usingAPI;
  if(usingAPI){
    if(!apiDate){ alert("Pas de date API définie"); usingAPI=false; return; }
    updateTargetDisplay(apiDate);
  }else{
    if(!manualDate){ alert("Pas de date manuelle définie"); usingAPI=true; return; }
    updateTargetDisplay(manualDate);
  }
}

document.getElementById("chooseTime").addEventListener("click",chooseManualTime);
document.getElementById("startBtn").addEventListener("click",startCountdown);
document.getElementById("resetBtn").addEventListener("click",resetManual);
document.getElementById("loadAPI").addEventListener("click",loadAPI);
document.getElementById("switchBtn").addEventListener("click",switchMode);

// restore from localStorage
if(localStorage.getItem(LS_MANUAL)) manualDate=new Date(localStorage.getItem(LS_MANUAL));
if(localStorage.getItem(LS_API)) apiDate=new Date(localStorage.getItem(LS_API));
if(localStorage.getItem(LS_APIURL)) apiUrl=localStorage.getItem(LS_APIURL);
if(usingAPI && apiDate) updateTargetDisplay(apiDate);
else if(manualDate) updateTargetDisplay(manualDate);

// simple canvas background
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let grid=[]; for(let i=0;i<50;i++) grid.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height}));
function animateBG(){
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="#222"; ctx.lineWidth=1;
  grid.forEach(p=>{
    p.x+=0.5; if(p.x>canvas.width) p.x=0;
    p.y+=0.5; if(p.y>canvas.height) p.y=0;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+20,p.y+20); ctx.stroke();
  });
  requestAnimationFrame(animateBG);
}
animateBG();
window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
